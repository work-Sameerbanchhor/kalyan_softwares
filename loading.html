<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - Kalyan Smart Student System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap');

        :root {
            --forest-900: #1a2e1a;
            --forest-800: #243524;
            --forest-700: #2d4a2d;
            --forest-600: #3a5c3a;
            --forest-500: #4a7c4a;
            --forest-400: #6b9e6b;
            --forest-300: #8fb88f;
            --forest-200: #b5d3b5;
            --forest-100: #dceadc;
            --forest-50:  #f0f7f0;

            --gold-500: #b8944a;
            --gold-400: #d4aa5c;
            --gold-300: #e8c882;

            --ivory-100: #faf8f4;
            --ivory-200: #f5f1ea;
            --ivory-300: #ede8df;
            --ivory-400: #ddd6c9;

            --text-dark: #1a2e1a;
            --text-muted: #7a8c7a;
            --text-on-dark: #e8eee8;
            --text-on-dark-muted: #a3b8a3;

            --danger: #c0392b;
            --success: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--forest-900);
            color: var(--text-on-dark);
            overflow: hidden;
            position: relative;
        }

        /* ── Layered Forest Background ── */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Radial gradient glow in center */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74,124,74,0.2) 0%, rgba(26,46,26,0) 70%);
            animation: glowPulse 4s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
        }

        /* Ambient forest blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.12;
            z-index: 0;
            animation: blobDrift 12s ease-in-out infinite alternate;
        }

        .blob-1 {
            width: 350px; height: 350px;
            background: var(--forest-500);
            top: -80px; left: -60px;
        }

        .blob-2 {
            width: 300px; height: 300px;
            background: var(--gold-400);
            bottom: -60px; right: -60px;
            animation-delay: -6s;
        }

        .blob-3 {
            width: 200px; height: 200px;
            background: var(--forest-400);
            top: 30%; right: 10%;
            animation-delay: -3s;
        }

        @keyframes blobDrift {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.2); }
        }

        /* ── Floating Leaf Particles ── */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .leaf {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            animation: leafFloat linear infinite;
        }

        .leaf:nth-child(1)  { left: 8%;   background: var(--forest-400); animation-duration: 10s; animation-delay: 0s;   width: 5px; height: 5px; }
        .leaf:nth-child(2)  { left: 18%;  background: var(--gold-400);   animation-duration: 14s; animation-delay: 2s;   width: 7px; height: 7px; }
        .leaf:nth-child(3)  { left: 28%;  background: var(--forest-300); animation-duration: 11s; animation-delay: 1s;   width: 4px; height: 4px; }
        .leaf:nth-child(4)  { left: 42%;  background: var(--forest-500); animation-duration: 13s; animation-delay: 3.5s; width: 6px; height: 6px; }
        .leaf:nth-child(5)  { left: 55%;  background: var(--gold-300);   animation-duration: 9s;  animation-delay: 0.5s; width: 8px; height: 8px; }
        .leaf:nth-child(6)  { left: 65%;  background: var(--forest-400); animation-duration: 12s; animation-delay: 4s;   width: 5px; height: 5px; }
        .leaf:nth-child(7)  { left: 78%;  background: var(--gold-500);   animation-duration: 15s; animation-delay: 1.8s; width: 6px; height: 6px; }
        .leaf:nth-child(8)  { left: 88%;  background: var(--forest-300); animation-duration: 10s; animation-delay: 2.8s; width: 4px; height: 4px; }
        .leaf:nth-child(9)  { left: 35%;  background: var(--gold-400);   animation-duration: 16s; animation-delay: 5s;   width: 7px; height: 7px; }
        .leaf:nth-child(10) { left: 92%;  background: var(--forest-500); animation-duration: 11s; animation-delay: 1.2s; width: 5px; height: 5px; }

        @keyframes leafFloat {
            0%   { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            8%   { opacity: 0.5; }
            50%  { transform: translateY(50vh) rotate(180deg) translateX(30px) scale(1); opacity: 0.4; }
            90%  { opacity: 0.2; }
            100% { transform: translateY(-10vh) rotate(360deg) translateX(-20px) scale(0.8); opacity: 0; }
        }

        /* ── Main Container ── */
        .splash-container {
            text-align: center;
            max-width: 440px;
            width: 100%;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* ── Logo with Forest Glow Ring ── */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: staggerIn 1s ease-out 0.3s forwards;
        }

        .logo-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 190px; height: 190px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                var(--forest-500),
                var(--gold-400),
                var(--forest-400),
                var(--gold-300),
                var(--forest-500)
            );
            opacity: 0.35;
            animation: spinGlow 6s linear infinite;
            filter: blur(22px);
        }

        .logo-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 175px; height: 175px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--gold-400);
            border-right-color: var(--forest-400);
            animation: spinRing 3.5s linear infinite;
        }

        .logo-ring-outer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 195px; height: 195px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-bottom-color: rgba(212,170,92,0.3);
            border-left-color: rgba(107,158,107,0.3);
            animation: spinRing 5s linear infinite reverse;
        }

        .logo {
            max-width: 140px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(74,124,74,0.3));
            animation: logoPulse 3.5s ease-in-out infinite;
        }

        @keyframes spinGlow {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes spinRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 20px rgba(74,124,74,0.3)); }
            50%      { transform: scale(1.04); filter: drop-shadow(0 0 30px rgba(74,124,74,0.5)); }
        }

        /* ── Text ── */
        .app-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            background: linear-gradient(135deg, var(--text-on-dark) 0%, var(--gold-300) 50%, var(--forest-200) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: 
                staggerIn 1s ease-out 0.6s forwards,
                gradientShift 5s ease-in-out infinite;
            opacity: 0;
        }

        .college-name {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-on-dark-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0.6rem;
            opacity: 0;
            animation: staggerIn 1s ease-out 0.8s forwards;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Decorative Divider ── */
        .divider {
            width: 60px;
            height: 2px;
            margin: 1.5rem auto 0;
            background: linear-gradient(90deg, transparent, var(--gold-400), transparent);
            opacity: 0;
            animation: staggerIn 1s ease-out 0.9s forwards;
        }

        /* ── Progress Bar ── */
        .loader-wrapper {
            margin-top: 2.5rem;
            position: relative;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            opacity: 0;
            animation: staggerIn 1s ease-out 1s forwards;
        }

        .loader-bar {
            position: absolute;
            width: 40%;
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--forest-500), var(--gold-400), var(--forest-400));
            background-size: 200% 100%;
            animation: 
                slide 2s cubic-bezier(0.4, 0, 0.2, 1) infinite,
                barGradient 3s linear infinite;
            box-shadow: 0 0 10px rgba(74,124,74,0.4);
        }

        @keyframes barGradient {
            0%   { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        @keyframes slide {
            0%   { left: -40%; }
            100% { left: 100%; }
        }

        /* ── Scanning Dots ── */
        .scanning-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 3px;
        }

        .scanning-dots span {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-on-dark-muted);
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .scanning-dots span:nth-child(1) { animation-delay: 0s; }
        .scanning-dots span:nth-child(2) { animation-delay: 0.2s; }
        .scanning-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40%           { opacity: 1;   transform: translateY(-4px); }
        }

        /* ── Status Text ── */
        .status-area {
            margin-top: 1.2rem;
            height: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: staggerIn 1s ease-out 1.2s forwards;
        }

        .status-text {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-on-dark-muted);
            transition: color 0.4s ease, opacity 0.3s ease;
        }

        /* ── Network Pulse Indicator ── */
        .network-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1.8rem;
            opacity: 0;
            animation: staggerIn 1s ease-out 1.4s forwards;
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--forest-400);
            position: relative;
        }

        .pulse-dot::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--forest-400);
            animation: pingPulse 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes pingPulse {
            0%         { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            75%, 100%  { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
        }

        .network-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--text-on-dark-muted);
            opacity: 0.5;
        }

        /* ── Retry Container ── */
        .retry-container {
            margin-top: 2rem;
            display: none;
            animation: staggerIn 0.5s ease-out forwards;
        }

        .retry-button {
            padding: 10px 28px;
            background: linear-gradient(135deg, var(--forest-700), var(--forest-800));
            color: #fff;
            border: 1px solid rgba(107,158,107,0.2);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 0.84rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26,46,26,0.3);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.02em;
        }

        .retry-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,170,92,0.15), transparent);
            transition: left 0.6s ease;
        }

        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(26,46,26,0.5);
            background: linear-gradient(135deg, var(--forest-600), var(--forest-700));
        }

        .retry-button:hover::before {
            left: 100%;
        }

        .retry-button:active {
            transform: translateY(0);
        }

        /* ── Stagger Entrance ── */
        @keyframes staggerIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── State Modifiers ── */
        body.state-timeout .loader-bar,
        body.state-error .loader-bar {
            background: var(--danger);
            animation: none;
            width: 100%;
            box-shadow: 0 0 10px rgba(192,57,43,0.4);
        }

        body.state-found .loader-bar {
            background: linear-gradient(90deg, var(--success), var(--forest-400));
            animation: none;
            width: 100%;
            box-shadow: 0 0 12px rgba(39,174,96,0.4);
            transition: width 0.6s ease;
        }

        body.state-timeout .status-text,
        body.state-error .status-text {
            color: #e57373;
        }

        body.state-found .status-text {
            color: var(--forest-200);
        }

        body.state-timeout .pulse-dot,
        body.state-error .pulse-dot {
            background: var(--danger);
        }

        body.state-timeout .pulse-dot::before,
        body.state-error .pulse-dot::before {
            background: var(--danger);
            animation: none;
        }

        body.state-found .pulse-dot {
            background: var(--success);
        }

        body.state-found .pulse-dot::before {
            background: var(--success);
        }

        /* ── Footer ── */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: var(--text-on-dark-muted);
            opacity: 0;
            animation: staggerIn 1s ease-out 2s forwards;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .footer span {
            color: var(--gold-400);
        }
    </style>
</head>
<body class="state-searching">

    <!-- Ambient Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Background Glow -->
    <div class="bg-glow"></div>

    <!-- Floating Leaf Particles -->
    <div class="particles">
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
    </div>

    <div class="splash-container">
        <!-- Logo with animated glow ring -->
        <div class="logo-container">
            <div class="logo-glow"></div>
            <div class="logo-ring-outer"></div>
            <div class="logo-ring"></div>
            <img src="media/kalyan_college_logo_bg_removed.png" alt="Kalyan Logo" class="logo">
        </div>

        <h1 class="app-name">Kalyan Smart Student System</h1>
        <div class="college-name">Kalyan Post Graduate College</div>
        <div class="divider"></div>

        <!-- Progress Bar -->
        <div class="loader-wrapper">
            <div class="loader-bar"></div>
        </div>

        <!-- Status -->
        <div class="status-area">
            <span class="status-text" id="status">Connecting to cloud infrastructure</span>
            <div class="scanning-dots" id="scanning-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Network Indicator -->
        <div class="network-indicator" id="network-indicator">
            <div class="pulse-dot"></div>
            <span class="network-label">Connecting</span>
        </div>

        <!-- Retry -->
        <div class="retry-container" id="retry-container">
            <button class="retry-button" onclick="handleRetry()">Retry Connection</button>
        </div>
    </div>

    <div class="footer">Powered by <span>Kalyan Technologies</span></div>

    <script>
        const statusEl = document.getElementById('status');
        const retryContainer = document.getElementById('retry-container');
        const scanningDots = document.getElementById('scanning-dots');
        const networkIndicator = document.getElementById('network-indicator');
        const networkLabel = networkIndicator.querySelector('.network-label');
        const body = document.body;

        // Cycling status messages for scanning state
        const scanMessages = [
            'Connecting to cloud infrastructure',
            'Securing server connection',
            'Initializing cloud services',
            'Connecting to backend',
            'Verifying secure routes'
        ];
        let msgIndex = 0;
        let cycleInterval;

        function startMessageCycle() {
            cycleInterval = setInterval(() => {
                msgIndex = (msgIndex + 1) % scanMessages.length;
                statusEl.style.opacity = '0';
                setTimeout(() => {
                    statusEl.textContent = scanMessages[msgIndex];
                    statusEl.style.opacity = '1';
                }, 300);
            }, 3000);
        }

        function stopMessageCycle() {
            clearInterval(cycleInterval);
        }

        startMessageCycle();

        // Secure Bridge Listener
        window.electronAPI.onDiscoveryStatus((status) => {
            console.log('[Status Received]', status);
            stopMessageCycle();
            
            statusEl.style.opacity = '0';
            setTimeout(() => {
                statusEl.textContent = status.message;
                statusEl.style.opacity = '1';
            }, 200);

            // Clear existing states
            body.classList.remove('state-searching', 'state-found', 'state-timeout', 'state-error');
            body.classList.add(`state-${status.state}`);

            if (status.state === 'timeout' || status.state === 'error') {
                retryContainer.style.display = 'block';
                scanningDots.style.display = 'none';
                networkLabel.textContent = 'Disconnected';
            } else if (status.state === 'found') {
                scanningDots.style.display = 'none';
                networkLabel.textContent = 'Connected';
            } else {
                retryContainer.style.display = 'none';
                scanningDots.style.display = 'inline-flex';
                networkLabel.textContent = 'Connecting';
            }
        });

        function handleRetry() {
            window.electronAPI.retryDiscovery();
            body.classList.remove('state-timeout', 'state-error');
            body.classList.add('state-searching');
            retryContainer.style.display = 'none';
            scanningDots.style.display = 'inline-flex';
            networkLabel.textContent = 'Connecting';
            msgIndex = 0;
            startMessageCycle();
        }
    </script>
</body>
</html>
