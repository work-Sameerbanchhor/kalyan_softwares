name: Build Windows Installer

on:
  push:
    branches:
      - main
      - software-development
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -------------------------------------------------------
  # Build 64-bit installer (Windows 7 x64 / Windows 10/11)
  # -------------------------------------------------------
  build-windows-x64:
    name: Build Windows Installer (x64 — Win7+)
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'      # Node 18 is the last LTS supported by Electron 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Convert PNG icon to ICO format
        run: magick media/kalyan_college_logo.png -resize 256x256 media/kalyan_college_logo.ico

      - name: Convert college banner to NSIS sidebar BMP
        run: magick media/kalyan_college_banner.png -resize 164x314! -gravity center media/installer_sidebar.bmp

      - name: Build Windows x64 Installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload x64 Installer Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kalyan-Smart-Student-System-Windows-x64
          path: |
            dist/*Setup*.exe
            dist/*-x64*.exe
          retention-days: 30
          if-no-files-found: warn

  # -------------------------------------------------------
  # Build 32-bit installer (Windows 7 ia32 — older PCs)
  # -------------------------------------------------------
  build-windows-ia32:
    name: Build Windows Installer (ia32 — Win7 32-bit)
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Convert PNG icon to ICO format
        run: magick media/kalyan_college_logo.png -resize 256x256 media/kalyan_college_logo.ico

      - name: Convert college banner to NSIS sidebar BMP
        run: magick media/kalyan_college_banner.png -resize 164x314! -gravity center media/installer_sidebar.bmp

      - name: Build Windows ia32 Installer
        run: npx electron-builder --win --ia32
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ia32 Installer Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kalyan-Smart-Student-System-Windows-ia32
          path: |
            dist/*Setup*.exe
            dist/*-ia32*.exe
          retention-days: 30
          if-no-files-found: warn

  # -------------------------------------------------------
  # Create GitHub Release (runs on every successful build)
  # -------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows-x64, build-windows-ia32]

    steps:
      - name: Download x64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: Kalyan-Smart-Student-System-Windows-x64
          path: release-assets/

      - name: Download ia32 Artifact
        uses: actions/download-artifact@v8
        with:
          name: Kalyan-Smart-Student-System-Windows-ia32
          path: release-assets/

      - name: Create Release with both installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: "Kalyan Smart Student System — Build #${{ github.run_number }}"
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Download Instructions

            | File | For which Windows? |
            |------|-------------------|
            | `*-x64.exe` | Windows 7 / 10 / 11 — **64-bit** (most modern PCs) |
            | `*-ia32.exe` | Windows 7 — **32-bit** (older PCs) |

            > **Not sure which to use?**  
            > On Windows 7: Go to *Control Panel → System* and check "System type". If it says "64-bit Operating System", download the x64 file. Otherwise download the ia32 file.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
